    post1:   `${FOLDER}/peace,peace! - 1.png`,
    post2:   `${FOLDER}/peace,peace! - 2.mp4`,
    post4:   `${FOLDER}/peace,peace! - 4.mp4`,
    post5:   `${FOLDER}/peace,peace! - 5.png`,
    post7:   `${FOLDER}/peace,peace! - 7.mp4`,
    post9:   `${FOLDER}/peace,peace! - 9.png`,
    post3_1: `${FOLDER}/peace,peace! - 3/1.png`,
    post3_2: `${FOLDER}/peace,peace! - 3/2.png`,
    post3_3: `${FOLDER}/peace,peace! - 3/3.png`,
    post6_1: `${FOLDER}/peace,peace! - 6/1.png`,
    post6_2: `${FOLDER}/peace,peace! - 6/2.png`,
    post6_3: `${FOLDER}/peace,peace! - 6/3.png`,
    post6_4: `${FOLDER}/peace,peace! - 6/4.png`,
    post6_5: `${FOLDER}/peace,peace! - 6/5.png`,
    post6_6: `${FOLDER}/peace,peace! - 6/6.png`,
    post8_1: `${FOLDER}/peace,peace! - 8/1.png`,
    post8_2: `${FOLDER}/peace,peace! - 8/2.png`,
    post8_3: `${FOLDER}/peace,peace! - 8/3.png`,

    // Reel thumbnail covers (shown on grid instead of video first-frame) ─
    thumb2:  `${FOLDER}/peace,peace! - thumbnail covers for reels 2,4,7/thumbnail for 2.png`,
    thumb4:  `${FOLDER}/peace,peace! - thumbnail covers for reels 2,4,7/thumbnail for 4.png`,
    thumb7:  `${FOLDER}/peace,peace! - thumbnail covers for reels 2,4,7/thumbnail for 7.png`,
  };

  const CONFIG = {
    username:    "peace.peace.film",
    displayName: "Peace, Peace!",
    avatarUrl:   "",           // put URL here to use a real image; empty = "pp" monogram
    bioLabel:    "Short Film",
    bioLines: [
      "An hour before his mother's funeral,",
      "everything begins to unravel.",
      "🎬 Dir. Dylan Brown · ca. 2026"
    ],
    bioLink: { text: "kennyproduces.com", url: "https://kennyproduces.com" }
  };

  /* ════════════════════════════════════════════════════════════════
     POST DATA
     ════════════════════════════════════════════════════════════════ */

  const POSTS = [
    {
      n: 1, type: 'photo',
      media: [FILES.post1],
      caption: "An hour before his mother's funeral, everything begins to unravel.",
      hashtags: "#PeacePeaceFilm #ShortFilm #IndieFilm #FilmStill #Cinematic"
    },
    {
      n: 2, type: 'reel',
      media: [FILES.post2],
      thumb: FILES.thumb2,
      caption: "An hour before his mother's funeral, everything begins to unravel.",
      hashtags: "#PeacePeaceFilm #ShortFilm #IndieFilm #FilmFestival #Cinematic"
    },
    {
      n: 3, type: 'carousel',
      media: [FILES.post3_1, FILES.post3_2, FILES.post3_3],
      caption: "Eddy has spent his life keeping the peace. Some things were never said.",
      hashtags: "#PeacePeaceFilm #Eddy #CharacterPost #ShortFilm #IndieFilm"
    },
    {
      n: 4, type: 'reel',
      media: [FILES.post4],
      thumb: FILES.thumb4,
      caption: "An hour before his mother's funeral, everything begins to unravel.",
      hashtags: "#PeacePeaceFilm #ShortFilm #IndieFilm #FilmFestival #Cinematic"
    },
    {
      n: 5, type: 'photo',
      media: [FILES.post5],
      caption: "When his brother refuses to deliver the eulogy, a long-buried truth surfaces. Festival submissions underway.",
      hashtags: "#PeacePeaceFilm #ShortFilm #IndieFilm #FilmStill #Cinematic",
      note_flag: "Placeholder artwork — final poster pending."
    },
    {
      n: 6, type: 'carousel',
      media: [FILES.post6_1, FILES.post6_2, FILES.post6_3, FILES.post6_4, FILES.post6_5, FILES.post6_6],
      caption: "Behind the scenes. A small set. A heavy story.",
      hashtags: "#PeacePeaceFilm #BTS #BehindTheScenes #ShortFilm #IndieFilm",
      note_flag: "Caption rewritten from Canva notes — verify before publishing."
    },
    {
      n: 7, type: 'reel',
      media: [FILES.post7],
      thumb: FILES.thumb7,
      caption: "Something is already wrong before anyone says it out loud.",
      hashtags: "#PeacePeaceFilm #Reel #ShortFilm #IndieCinema #FilmMood"
    },
    {
      n: 8, type: 'carousel',
      media: [FILES.post8_1, FILES.post8_2, FILES.post8_3],
      caption: "Some things don't need to be said to be understood.",
      hashtags: "#PeacePeaceFilm #Eddy #CharacterPost #ShortFilm #IndieFilm",
      note_flag: "Slide 1 still has placeholder overlay — swap for final still."
    },
    {
      n: 9, type: 'photo',
      media: [FILES.post9],
      caption: "A short film about what happens when everything is held in… until it isn't.\n— Dylan Brown, Director",
      hashtags: "#PeacePeaceFilm #FilmFestival #ShortFilm #IndieFilm #DirectorVision"
    }
  ];

  // IG grids display newest-first (top-left). POSTS is authored in publish
  // order 1 → 9, so reverse for display. Modal nav follows grid order.
  POSTS.reverse();

  /* ════════════════════════════════════════════════════════════════
     ICONS
     ════════════════════════════════════════════════════════════════ */

  const ICON_REEL = `<svg class="pp-tile-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10.93 2.045c-.546.056-2.517.344-4.247 1.64C4.808 5.117 3.797 6.855 3.319 8.024q-.083.203-.159.411a13 13 0 0 0-.756 4.823q.02 1.203.186 2.102c.148.818.393 1.63.962 2.512c1.368 2.116 3.658 3.96 6.083 4.702q.489.157.957.263q.934.22 1.86.251q.423.017.837.001c2.521-.086 4.659-.988 5.976-2.013c1.717-1.337 2.656-3.078 3.01-4.116c.17-.491.332-1.064.45-1.693q.034-.185.064-.373q.06-.374.1-.758q.04-.395.056-.797q.012-.207.015-.412q.042-2.633-.842-4.95c-.56-1.469-1.735-3.068-3.616-4.22l-.154-.092a11 11 0 0 0-1.864-.889q-.358-.129-.716-.232a10.3 10.3 0 0 0-2.796-.399q-.342-.005-.683.008a13 13 0 0 0-1.257.096m4.005 10.563l-5.72 3.363c-.46.27-1.162.188-1.162-.665V8.556c0-.767.687-1.05 1.162-.766l5.72 3.672c.46.284.48.98 0 1.146"/></svg>`;
  const ICON_CAROUSEL = `<svg class="pp-tile-icon" viewBox="0 0 48 48" fill="currentColor" aria-hidden="true"><path d="M34.02 6.75H13.98a7.25 7.25 0 0 0-7.25 7.25v20.04a7.25 7.25 0 0 0 7.25 7.25h20.04a7.25 7.25 0 0 0 7.25-7.25V14a7.25 7.25 0 0 0-7.25-7.25m-20.04 1.5h20.04a5.75 5.75 0 0 1 5.75 5.75v20.04a5.75 5.75 0 0 1-5.75 5.75H13.98a5.75 5.75 0 0 1-5.75-5.75V14a5.75 5.75 0 0 1 5.75-5.75M43.55 16.27a.75.75 0 0 0-1.5 0V37.7a3.27 3.27 0 0 1-3.28 3.27.75.75 0 0 0 0 1.5 4.77 4.77 0 0 0 4.78-4.77z"/></svg>`;

  /* ════════════════════════════════════════════════════════════════
     RENDERING
     ════════════════════════════════════════════════════════════════ */

  const isVideo = url => /\.(mp4|webm|mov)(\?|$)/i.test(url || '');

  function initProfile() {
    document.getElementById('pp-username').textContent = CONFIG.username;
    const avatar = document.getElementById('pp-avatar');
    if (CONFIG.avatarUrl) {
      avatar.innerHTML = `<img src="${CONFIG.avatarUrl}" alt="${CONFIG.username}">`;
    }
    const bio = document.getElementById('pp-bio');
    bio.innerHTML = `
      <div><span class="pp-display-name">${escapeHtml(CONFIG.displayName)}</span><span class="pp-bio-label">· ${escapeHtml(CONFIG.bioLabel)}</span></div>
      ${CONFIG.bioLines.map(l => `<div>${escapeHtml(l)}</div>`).join('')}
      <div><a class="pp-link" href="${CONFIG.bioLink.url}" target="_blank" rel="noopener">🔗 ${escapeHtml(CONFIG.bioLink.text)}</a></div>
    `;
  }

  function buildGrid() {
    const grid = document.getElementById('pp-grid');
    grid.innerHTML = '';
    POSTS.forEach((p, i) => {
      const tile = document.createElement('div');
      tile.className = 'pp-tile';

      const first = p.media[0];
      let mediaEl;
      if (p.thumb) {
        // explicit thumbnail provided (e.g. reel cover) — show still, keep video for modal
        mediaEl = `<img class="pp-tile-media" src="${p.thumb}" alt="Post ${p.n}" loading="lazy">`;
      } else if (p.type === 'reel' || isVideo(first)) {
        mediaEl = `<video class="pp-tile-media" src="${first}" muted playsinline preload="metadata"></video>`;
      } else {
        mediaEl = `<img class="pp-tile-media" src="${first}" alt="Post ${p.n}" loading="lazy">`;
      }

      let icon = '';
      if (p.type === 'reel')     icon = ICON_REEL;
      if (p.type === 'carousel') icon = ICON_CAROUSEL;

      tile.innerHTML = `
        ${mediaEl}
        ${icon}
        ${p.note_flag ? '<div class="pp-tile-flag" title="Has production note"></div>' : ''}
        <div class="pp-tile-hover-meta">
          <div><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>0</div>
          <div><svg viewBox="0 0 24 24"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>0</div>
        </div>
      `;
      tile.addEventListener('click', () => openModal(i));
      grid.appendChild(tile);
    });
  }

  /* ── MODAL ────────────────────────────────────────────────── */

  let currentIdx = 0;
  let carouselIdx = 0;

  function openModal(i) {
    currentIdx = i;
    carouselIdx = 0;
    renderModal();
    document.getElementById('pp-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('pp-modal').classList.remove('open');
    document.body.style.overflow = '';
    const v = document.querySelector('#pp-modal video');
    if (v) v.pause();
  }

  function renderModal() {
    const p = POSTS[currentIdx];
    const card = document.getElementById('pp-modal-card');

    let mediaBlock;
    if (p.type === 'carousel') {
      const src = p.media[carouselIdx];
      mediaBlock = `
        <div class="pp-modal-media">
          <img src="${src}" alt="Post ${p.n} slide ${carouselIdx+1}">
          ${p.media.length > 1 ? `
            ${carouselIdx > 0 ? '<button class="pp-car-arrow prev" id="pp-car-prev" aria-label="Previous slide">‹</button>' : ''}
            ${carouselIdx < p.media.length - 1 ? '<button class="pp-car-arrow next" id="pp-car-next" aria-label="Next slide">›</button>' : ''}
            <div class="pp-car-dots">
              ${p.media.map((_, i) => `<div class="pp-car-dot${i === carouselIdx ? ' active' : ''}"></div>`).join('')}
            </div>` : ''}
        </div>
      `;
    } else if (p.type === 'reel' || isVideo(p.media[0])) {
      mediaBlock = `<div class="pp-modal-media"><video src="${p.media[0]}" controls autoplay playsinline></video></div>`;
    } else {
      mediaBlock = `<div class="pp-modal-media"><img src="${p.media[0]}" alt="Post ${p.n}"></div>`;
    }

    const avatarInner = CONFIG.avatarUrl
      ? `<img src="${CONFIG.avatarUrl}" alt="${CONFIG.username}">`
      : `<div>pp</div>`;

    card.innerHTML = `
      ${mediaBlock}
      <div class="pp-side">
        <div class="pp-side-head">
          <div class="pp-side-head-avatar">${avatarInner}</div>
          <div class="pp-side-head-name">${escapeHtml(CONFIG.username)}</div>
          <div class="pp-side-head-menu">⋯</div>
        </div>

        <div class="pp-side-body">
          <div class="pp-caption">
            <span class="pp-cap-user">${escapeHtml(CONFIG.username)}</span>${escapeHtml(p.caption)}
          </div>
          <div class="pp-hashtags">${escapeHtml(p.hashtags)}</div>
          ${p.note_flag ? `<div class="pp-note-flag"><strong>▲ Production note ·</strong> ${escapeHtml(p.note_flag)}</div>` : ''}
          <div class="pp-side-meta">
            <span class="pp-side-meta-chip">Post ${String(p.n).padStart(2,'0')} / 09</span>
            <span class="pp-side-meta-chip">${p.type.toUpperCase()}${p.type === 'carousel' ? ' · ' + p.media.length + ' slides' : ''}</span>
          </div>
        </div>

        <div class="pp-side-actions">
          <div class="pp-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
          <div class="pp-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
          <div class="pp-icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></div>
          <div class="pp-icon-btn bookmark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
        </div>

        <div class="pp-side-footer">
          <button class="pp-copy-btn" data-copy="caption">Copy caption</button>
          <button class="pp-copy-btn" data-copy="hashtags">Copy hashtags</button>
          <button class="pp-copy-btn" data-copy="both">Copy both</button>
        </div>
      </div>
    `;

    // wire copy buttons
    card.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', () => copyContent(btn.dataset.copy, btn));
    });
    // carousel nav
    const cprev = document.getElementById('pp-car-prev');
    const cnext = document.getElementById('pp-car-next');
    if (cprev) cprev.addEventListener('click', e => { e.stopPropagation(); carouselIdx--; renderModal(); });
    if (cnext) cnext.addEventListener('click', e => { e.stopPropagation(); carouselIdx++; renderModal(); });

    // post nav buttons (fixed outside card)
    document.getElementById('pp-prev-post').disabled = currentIdx === 0;
    document.getElementById('pp-next-post').disabled = currentIdx === POSTS.length - 1;
  }

  function copyContent(which, btn) {
    const p = POSTS[currentIdx];
    let text = '';
    if (which === 'caption')  text = p.caption;
    if (which === 'hashtags') text = p.hashtags;
    if (which === 'both')     text = p.caption + '\n\n' + p.hashtags;
    const done = () => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1400);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    cb && cb();
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ── EVENT WIRING ─────────────────────────────────────────── */

  document.getElementById('pp-close').addEventListener('click', closeModal);
  document.getElementById('pp-modal').addEventListener('click', e => {
    if (e.target.id === 'pp-modal') closeModal();
  });
  document.getElementById('pp-prev-post').addEventListener('click', e => {
    e.stopPropagation();
    if (currentIdx > 0) { currentIdx--; carouselIdx = 0; renderModal(); }
  });
  document.getElementById('pp-next-post').addEventListener('click', e => {
    e.stopPropagation();
    if (currentIdx < POSTS.length - 1) { currentIdx++; carouselIdx = 0; renderModal(); }
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('pp-modal').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft') {
      const car = document.getElementById('pp-car-prev');
      if (car) car.click();
      else if (currentIdx > 0) { currentIdx--; carouselIdx = 0; renderModal(); }
    }
    else if (e.key === 'ArrowRight') {
      const car = document.getElementById('pp-car-next');
      if (car) car.click();
      else if (currentIdx < POSTS.length - 1) { currentIdx++; carouselIdx = 0; renderModal(); }
    }
  });

  initProfile();
  buildGrid();
})();
</script>
